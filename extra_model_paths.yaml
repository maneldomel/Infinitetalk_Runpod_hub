# Aponta o ComfyUI pros modelos no Network Volume (montado em /runpod-volume no serverless).
# Os modelos ficam em /runpod-volume/ComfyUI/models/... (mesma estrutura da VPS, onde
# o volume monta em /workspace/ComfyUI/models).
runpod_volume:
    base_path: /runpod-volume/ComfyUI/
    is_default: true
    checkpoints: models/checkpoints
    diffusion_models: models/diffusion_models
    unet: models/diffusion_models
    text_encoders: models/text_encoders
    clip: models/clip
    clip_vision: models/clip_vision
    vae: models/vae
    loras: models/loras
    upscale_models: models/upscale_models
